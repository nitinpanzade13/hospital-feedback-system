version: '3.9'

services:

  backend:
    build:
      context: .
      dockerfile: ./Dockerfile.backend
    container_name: hospital-feedback-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app:delegated
    environment:
      # MongoDB
      - MONGODB_URL=${MONGODB_URL}
      - DATABASE_NAME=hospital_feedback
      
      # JWT & Security
      - SECRET_KEY=${SECRET_KEY}
      
      # Email Configuration
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - APP_URL=${APP_URL}
      
      # Default Superadmin
      - SUPERADMIN_EMAIL=${SUPERADMIN_EMAIL}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD}
      
      # Google Forms
      - GOOGLE_FORM_URL=${GOOGLE_FORM_URL}
      
      # Server
      - API_HOST=0.0.0.0
      - API_PORT=8000
    networks:
      - hospital-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend: Served as static files via Nginx
  # Build frontend first: cd frontend && npm run build
  # Then run: docker-compose up -d
  frontend:
    build:
      context: .
      dockerfile: ./Dockerfile.frontend
    container_name: hospital-feedback-app
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - hospital-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Optional: MongoDB (if running locally)
  # Uncomment below if you want MongoDB to run in Docker
  # mongodb:
  #   image: mongo:7
  #   container_name: hospital-feedback-db
  #   ports:
  #     - "27017:27017"
  #   environment:
  #     - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
  #     - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
  #   volumes:
  #     - mongo-data:/data/db
  #   networks:
  #     - hospital-network
  #   restart: unless-stopped

  # Optional: MongoDB Express (Admin UI)
  # Uncomment below to access MongoDB via web interface
  # mongo-express:
  #   image: mongo-express
  #   container_name: hospital-feedback-db-ui
  #   ports:
  #     - "8081:8081"
  #   environment:
  #     - ME_CONFIG_MONGODB_URL=${MONGODB_URL}
  #   depends_on:
  #     - mongodb
  #   networks:
  #     - hospital-network
  #   restart: unless-stopped

networks:
  hospital-network:

